services:
  app:
    # Builds from source by default. If you've cut a tagged release (see
    # .github/workflows/release.yml — git tag v1.0.0 && git push origin v1.0.0), pre-built
    # images are published too; swap this `build:` block for e.g.
    # `image: docker.io/wwwescape/listarr:1.0.0` (or the
    # `ghcr.io/wwwescape/listarr:1.0.0` equivalent) to deploy that instead.
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    # Named volumes, not bind mounts — survive `docker compose down`/image rebuilds/
    # upgrades; only `docker compose down -v` removes them. Paths must match
    # DEFAULT_SQLITE_PATH in backend/app/core/config.py.
    volumes:
      - db-data:/app/backend/db
    restart: unless-stopped

volumes:
  db-data:
