[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [".venv", "venv", "alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI's `param: T = Depends(...)` pattern trips B008 (function call in default arg)

[tool.pytest.ini_options]
pythonpath = ["."]
addopts = "--cov=app --cov-report=term-missing"

[tool.coverage.run]
branch = true

[tool.coverage.report]
fail_under = 90
exclude_also = ["\\.\\.\\.$"]
